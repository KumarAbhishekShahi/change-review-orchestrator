name: CI

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: "sqlite:///./test_change_review.db"
  LOG_FORMAT: console
  LOG_LEVEL: WARNING

jobs:
  # ── Lint + format ──────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff lint
        run: ruff check src/ tests/

      - name: ruff format check
        run: ruff format --check src/ tests/

      - name: mypy type check
        run: mypy src/change_review_orchestrator --ignore-missing-imports
        continue-on-error: true   # advisory only until type coverage improves

  # ── Unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=change_review_orchestrator \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Integration tests ─────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v -x

  # ── Smoke test ────────────────────────────────────────────────────────
  smoke-test:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start API server in background
        run: |
          uvicorn change_review_orchestrator.main:app --port 8765 &
          sleep 5

      - name: Health check
        run: curl -f http://localhost:8765/health

      - name: Submit PCI review and verify REJECT
        run: |
          python scripts/smoke_test.py --base-url http://localhost:8765

  # ── Docker build ──────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          tags: change-review-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
