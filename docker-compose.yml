version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cro
      POSTGRES_PASSWORD: cro_dev_password
      POSTGRES_DB: change_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cro -d change_review"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      DATABASE_URL: postgresql://cro:cro_dev_password@db:5432/change_review
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      # GEMINI_API_KEY: set in .env file
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.50.0
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    profiles:
      - monitoring

volumes:
  postgres_data:
